name: Release Python App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    permissions:
      contents: write
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6==6.10.1 pandas==2.2.0 openpyxl==3.1.2 xlsxwriter==3.1.9 pyinstaller==6.17.0

      - name: Build with PyInstaller
        run: pyinstaller CSVtoExcelPro.spec

      - name: Prepare Artifacts
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            mv dist/CSV-to-Excel-Pro.exe "CSV-to-Excel-Pro-Win.exe"
            echo "ASSET_NAME=CSV-to-Excel-Pro-Win.exe" >> $GITHUB_ENV
          else
            cd dist
            zip -r "../CSV-to-Excel-Pro-Mac.zip" "CSV-to-Excel-Pro.app"
            cd ..
            echo "ASSET_NAME=CSV-to-Excel-Pro-Mac.zip" >> $GITHUB_ENV
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_NAME }}
          body_path: releases/notes/latest.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}